#############################################################################
#   External Config Includes
#############################################################################
[include autotune_tmc.cfg]
[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Smart_Park.cfg]
[include ./KAMP/Line_Purge.cfg]

########################################
# Klipper Configuration
# Machine  : Lulzbot TAZ 6 (Klipperized)
# Host     : HP T420 Thin Client
# Board    : BTT SKR Mini E3 V3.0 (STM32G0B1)
########################################
#
# BEFORE FIRST USE — MANDATORY STEPS:
#  1. Find your serial ID:    ls /dev/serial/by-id/
#     Update [mcu] serial below with your actual ID.
#  2. Verify dir_pin polarity for each axis by moving each axis
#     a short distance and checking direction. Invert with '!'
#     prefix if backwards.
#  3. Verify your thermistor types match the hardware. Wrong
#     types can cause thermal runaway.
#  4. Calibrate extruder rotation_distance before printing.
#  5. Run PID_CALIBRATE for both hotend and bed.
#  6. Run PROBE_CALIBRATE to set Z offset.
#  7. Verify probe pin polarity — change ^PC14 to ^!PC14 if
#     probe never triggers or is always triggered.
#
########################################

##########################################################################################################################################################
#   Base Config
##########################################################################################################################################################
########################################
# MCU
########################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_3E00260005504E5238363120-if00
baud: 250000
restart_method: command

[temperature_sensor T420]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[printer]
kinematics: cartesian
max_velocity: 200             # Conservative for TAZ 6 — raise after resonance testing
max_accel: 2000               # Raise after input shaper calibration
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5.0

[respond]
[gcode_arcs]
[pause_resume]
[display_status]
[exclude_object]
[firmware_retraction]
[virtual_sdcard]
path: ~/printer_data/gcodes
[force_move]
enable_force_move : True
[idle_timeout]
timeout: 2100

##########################################################################################################################################################
#   X/Y/Z Stepper Config
##########################################################################################################################################################
########################################
# X STEPPER
########################################
[stepper_x]
step_pin: PB13
dir_pin: !PB12                # Invert (remove '!') if X moves the wrong direction
enable_pin: !PB14
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 280
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.850            # TAZ 6 OEM motors are ~1.68A rated; 0.85A RMS is safe
stealthchop_threshold: 999999

########################################
# Y STEPPER
########################################
[stepper_y]
step_pin: PB10
dir_pin: PB2                  # Invert ('!PB2') if Y moves the wrong direction
enable_pin: !PB11
microsteps: 16
rotation_distance: 32         # Same pulley as X
full_steps_per_rotation: 200
endstop_pin: ^PC1
position_endstop: 280         # Endstop is at Y-MAX (rear)
position_min: 0
position_max: 280
homing_positive_dir: true     # Homes toward rear (Y-MAX)
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.850
stealthchop_threshold: 999999

########################################
# Z STEPPER
########################################
########################################
# Z AXIS
# Two Z steppers wired in parallel via Y-splitter on the Z driver output.
# Endstop is at the TOP of the gantry (Z-MAX).
#
# PARALLEL WIRING NOTE:
#   Each motor receives half the driver current. If 0.900A is set,
#   each motor sees ~0.450A. Raise to 1.200–1.400 if Z skips under load,
#   staying within the TMC2209's 2A limit.
########################################

[stepper_z]
step_pin: PB0
dir_pin: !PC5                 # Invert (remove '!') if Z moves the wrong direction
enable_pin: !PB1
microsteps: 16
rotation_distance: 2          # Derived from OEM 1600 steps/mm @ 1/16 microstep:
                              # (200 × 16) / 1600 = 2mm lead per revolution
full_steps_per_rotation: 200
endstop_pin: ^PC2
position_endstop: 250         # Z homes to the TOP; set to your actual max Z travel
position_min: -3              # Small negative allowance for probe calibration
position_max: 250
homing_positive_dir: true     # Homes UPWARD to Z-MAX endstop
homing_speed: 8
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.900
stealthchop_threshold: 999999

########################################
# EXTRUDER
########################################
# ########################################
# # DRAGON BURNER v8 TOOLHEAD (INACTIVE)
# # TZ-V6 hotend + Sherpa Mini extruder + BTT Microprobe
# ########################################

# [extruder]
# step_pin: PB3
# dir_pin: !PB4
# enable_pin: !PD2
# microsteps: 16
# rotation_distance: 22.452         # Sherpa Mini — calibrate for your build
# gear_ratio: 50:10                 # Sherpa Mini standard 5:1 ratio
# full_steps_per_rotation: 200
# nozzle_diameter: 0.400
# filament_diameter: 1.750
# heater_pin: PC8
# sensor_type: ATC Semitec 104GT-2  # TZ-V6 (Trianglelab V6) uses Semitec glass bead
# sensor_pin: PA0
# min_temp: 0
# max_temp: 280
# min_extrude_temp: 180
# max_extrude_only_distance: 200
# max_extrude_only_velocity: 60
# control: pid
# pid_Kp: 21.527
# pid_Ki: 1.063
# pid_Kd: 108.982
# pressure_advance: 0.04            # Calibrate separately for this toolhead

# [tmc2209 extruder]
# uart_pin: PC11
# tx_pin: PC10
# uart_address: 3
# run_current: 0.600                # Sherpa Mini typically runs a small NEMA14 motor
# stealthchop_threshold: 0


########################################
# NEPTUNE 4 PRO TOOLHEAD
# Stock N4P toolhead with BTT Microprobe
########################################

[extruder]
step_pin: PB3
dir_pin: PB4                  # Invert ('!PB4') if extruder feeds the wrong way
enable_pin: !PD2
microsteps: 16
# !! MUST CALIBRATE before printing !!
# Measure 100mm, extrude, measure remainder, then:
#   rotation_distance = old_rotation_distance × actual_mm / requested_mm
# See: https://www.klipper3d.org/Rotation_Distance.html
rotation_distance: 22.678     # PLACEHOLDER — calibrate for your N4P extruder mechanism
gear_ratio: 50:17             # PLACEHOLDER — adjust for the actual gear ratio in the N4P toolhead
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
# Common thermistor types — verify against your actual hardware:
#   Generic 3950          → blue-tipped NTC 100K B3950 (very common on budget toolheads)
#   ATC Semitec 104GT-2   → glass-bead NTC 100K (older Semitec)
#   ATC Semitec 104NT-4-R025H42G → newer Semitec (E3D, Bambu-style)
sensor_type: Generic 3950     # VERIFY this matches your N4P thermistor
sensor_pin: PA0
min_temp: 0
max_temp: 300
min_extrude_temp: 180
max_extrude_only_distance: 200
max_extrude_only_velocity: 60
# Run: PID_CALIBRATE HEATER=extruder TARGET=200
# Then SAVE_CONFIG
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
pressure_advance: 0.05        # Calibrate with a PA tower or line test

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.700
stealthchop_threshold: 0      # SpreadCycle (not StealthChop) for extruder —
                              # required for accurate pressure advance response


##########################################################################################################################################################
#   HEATED BED CONFIG
##########################################################################################################################################################

[heater_bed]
heater_pin: PC9
# Silicone heater mat thermistors are usually NTC 100K B3950 (Generic 3950)
# or NTC 100K ATC Semitec — check your mat's datasheet.
sensor_type: Generic 3950     # VERIFY this matches your silicone heater thermistor
sensor_pin: PC4
min_temp: 0
max_temp: 130
# Run: PID_CALIBRATE HEATER=heater_bed TARGET=60
# Then SAVE_CONFIG
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182


##########################################################################################################################################################
#   PROBE Config
##########################################################################################################################################################

[probe]
pin: ^PC14
# If probe behavior is inverted (never triggers / always triggered), change to:
# pin: ^!PC14
x_offset: 0.0    # Measure horizontal offset: probe tip relative to nozzle tip, X axis
y_offset: 0.0    # Measure horizontal offset: probe tip relative to nozzle tip, Y axis
z_offset: 0.0    # DO NOT set manually — run PROBE_CALIBRATE then SAVE_CONFIG
speed: 5.0
lift_speed: 10.0
samples: 2
sample_retract_dist: 3.0
samples_result: median
samples_tolerance: 0.010
samples_tolerance_retries: 3


##########################################################################################################################################################
#   FANS Config
##########################################################################################################################################################

# FAN0 — Hotend cooling fan (thermostatically controlled)
[heater_fan hotend_fan]
pin: PC6
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# FAN1 — Parts cooling fan (M106/M107 / slicer controlled)
[fan]
pin: PC7

# FAN2 — Chamber heating fans
# Two 4015 blowers blowing air across the silicone bed heater to warm the chamber.
# Controlled via SET_FAN_SPEED or the CHAMBER_FANS_ON / CHAMBER_FANS_OFF macros below.
[fan_generic chamber_fans]
pin: PB15


##########################################################################################################################################################
#   FILAMENT SENSOR Config
##########################################################################################################################################################

[filament_switch_sensor filament_sensor]
pause_on_runout: true
runout_gcode:
    PAUSE
    M117 Filament runout!
switch_pin: ^PC15
# ^PC15 = internal pull-up enabled; active HIGH = runout (open circuit, no filament)

##########################################################################################################################################################
#   LED Config
##########################################################################################################################################################
########################################
# LED STRIP
# Strip is connected to the Neopixel header's GND and 5V/PWR pins only.
# No data signal → strip is always on when the board is powered.
# No config section is required.
#
# If addressable LEDs added later, a data wire to PA8, uncomment and configure:
########################################
# [neopixel led_strip]
# pin: PA8
# chain_count: 30        # Set to your actual LED count
# color_order: GRB       # GRB for WS2812B; check your strip type
# initial_RED: 0.5
# initial_GREEN: 0.5
# initial_BLUE: 0.5


##########################################################################################################################################################
#   HOMING & LEVELING Config
##########################################################################################################################################################
########################################
# HOMING OVERRIDE
# Custom homing sequence to handle the Z-MAX endstop:
#  1. Home X (toward X-MIN)
#  2. Home Y (toward Y-MAX / rear)
#  3. Move XY to bed center
#  4. Home Z (travels UP to the top endstop)
#  5. Drop Z to a safe working height
########################################

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set do_x = 'X' in params or (not 'Y' in params and not 'Z' in params) %}
    {% set do_y = 'Y' in params or (not 'X' in params and not 'Z' in params) %}
    {% set do_z = 'Z' in params or (not 'X' in params and not 'Y' in params) %}

    G90                                     ; Ensure absolute mode

    {% if do_x %}
        G28 X                               ; Home X to X-MIN
    {% endif %}

    {% if do_y %}
        G28 Y                               ; Home Y to Y-MAX (rear)
    {% endif %}

    {% if do_z %}
        ; Move to bed center before Z homing to avoid gantry-corner collisions
        {% if not do_x %}
            G1 X140 F6000
        {% endif %}
        {% if not do_y %}
            G1 Y140 F6000
        {% endif %}
        G28 Z                               ; Home Z upward to Z-MAX endstop
        G1 Z220 F1200                       ; Drop gantry to a safe working height
    {% endif %}


########################################
# BED MESH LEVELING
########################################

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 260, 260
probe_count: 5, 5
mesh_pps: 2, 2
algorithm: bicubic
zero_reference_position: 140, 140   # Bed center — mesh is referenced here
fade_start: 1.0
fade_end: 10.0
fade_target: 0.0


########################################
# BED SCREW TRAMMING AID
# Approximate positions — measure your actual screw locations.
########################################

[bed_screws]
screw1: 30, 30
screw1_name: Front Left
screw2: 250, 30
screw2_name: Front Right
screw3: 250, 250
screw3_name: Back Right
screw4: 30, 250
screw4_name: Back Left


########################################
# INPUT SHAPER (optional)
# Requires an ADXL345 or LIS2DW accelerometer.
# Run SHAPER_CALIBRATE after wiring one up.
########################################

# [input_shaper]
# shaper_freq_x: 0     ; Set from SHAPER_CALIBRATE output
# shaper_freq_y: 0
# shaper_type: mzv


########################################
# G-CODE EXTRAS
########################################

[gcode_arcs]
resolution: 0.1

[display_status]

[pause_resume]
recover_velocity: 50

[virtual_sdcard]
path: ~/printer_data/gcodes

[exclude_object]


########################################
# MACROS
########################################

[gcode_macro START_PRINT]
description: Standard start sequence. Pass BED_TEMP and EXTRUDER_TEMP from slicer.
gcode:
    {% set BED_TEMP          = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP     = params.EXTRUDER_TEMP|default(200)|float %}
    {% set CHAMBER_FAN_SPEED = params.CHAMBER_FAN_SPEED|default(0.5)|float %}

    M117 Heating bed...
    M140 S{BED_TEMP}                            ; Start bed — don't wait yet

    M117 Starting chamber fans...
    SET_FAN_SPEED FAN=chamber_fans SPEED={CHAMBER_FAN_SPEED}

    M117 Homing...
    G28                                         ; Home all axes

    M117 Waiting for bed...
    M190 S{BED_TEMP}                            ; Wait for bed to reach temp

    M117 Calibrating mesh...
    BED_MESH_CALIBRATE                          ; Dynamic bed leveling

    M117 Heating hotend...
    M109 S{EXTRUDER_TEMP}                       ; Wait for hotend

    G90                                         ; Absolute positioning
    G92 E0                                      ; Reset extruder
    G1 Z5 F3000
    G1 X5 Y10 F5000                             ; Move to purge start
    G1 Z0.3 F1000
    G1 X80 E12 F500                             ; Purge line
    G1 X100 E14 F500
    G92 E0                                      ; Reset extruder after purge
    G1 Z2 F3000
    M117 Printing...

[gcode_macro END_PRINT]
description: Standard end sequence.
gcode:
    {% set MAX_Y = printer.toolhead.axis_maximum.y %}

    M117 Finishing...
    G91                                         ; Relative
    G1 E-5 F3000                                ; Retract
    G1 Z15 F3000                                ; Lift
    G90                                         ; Absolute
    G1 X10 Y{MAX_Y - 10} F5000                 ; Present print at rear
    TURN_OFF_HEATERS
    M106 S0                                     ; Parts fan off
    SET_FAN_SPEED FAN=chamber_fans SPEED=0      ; Chamber fans off
    M84                                         ; Disable motors
    M117 Print complete!

[gcode_macro PAUSE]
description: Pause the running print.
rename_existing: BASE_PAUSE
gcode:
    {% set E = params.E|default(5)|float %}
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-{E} F2100                              ; Retract
    G1 Z10 F3000                                ; Lift
    G90
    G1 X10 Y10 F6000                            ; Park
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=0

[gcode_macro RESUME]
description: Resume a paused print.
rename_existing: BASE_RESUME
gcode:
    {% set E = params.E|default(5)|float %}
    G91
    G1 E{E} F2100                               ; Re-prime
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
description: Cancel the running print.
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    M106 S0
    SET_FAN_SPEED FAN=chamber_fans SPEED=0
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    BASE_CANCEL_PRINT
    END_PRINT

[gcode_macro CHAMBER_FANS_ON]
description: Turn on chamber heating fans. Optional SPEED=0.0–1.0 (default 0.5).
gcode:
    {% set SPEED = params.SPEED|default(0.5)|float %}
    SET_FAN_SPEED FAN=chamber_fans SPEED={SPEED}
    M117 Chamber fans: {(SPEED * 100)|int}%

[gcode_macro CHAMBER_FANS_OFF]
description: Turn off chamber heating fans.
gcode:
    SET_FAN_SPEED FAN=chamber_fans SPEED=0
    M117 Chamber fans off

[gcode_macro PID_TUNE_ALL]
description: Run PID calibration for hotend and bed back-to-back.
gcode:
    M117 PID tuning hotend (200 C)...
    PID_CALIBRATE HEATER=extruder TARGET=200
    M117 PID tuning bed (60 C)...
    PID_CALIBRATE HEATER=heater_bed TARGET=60
    M117 PID tuning done — run SAVE_CONFIG


