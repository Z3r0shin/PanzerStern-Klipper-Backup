#############################################################################
#   External Config Includes
#############################################################################
[include autotune_tmc.cfg]
[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Smart_Park.cfg]
[include ./KAMP/Line_Purge.cfg]

########################################
# Klipper Configuration
# Machine  : Lulzbot TAZ 6 (Klipperized)
# Host     : HP T420 Thin Client
# Board    : BTT SKR Mini E3 V3.0 (STM32G0B1)
########################################
#
# BEFORE FIRST USE — MANDATORY STEPS:
#  1. Find your serial ID:    ls /dev/serial/by-id/
#     Update [mcu] serial below with your actual ID.
#  2. Verify dir_pin polarity for each axis by moving each axis
#     a short distance and checking direction. Invert with '!'
#     prefix if backwards.
#  3. Verify your thermistor types match the hardware. Wrong
#     types can cause thermal runaway.
#  4. Calibrate extruder rotation_distance before printing.
#  5. Run PID_CALIBRATE for both hotend and bed.
#  6. Run PROBE_CALIBRATE to set Z offset.
#  7. Verify probe pin polarity — change ^PC14 to ^!PC14 if
#     probe never triggers or is always triggered.
#
########################################

##########################################################################################################################################################
#   Base Config
##########################################################################################################################################################
########################################
# MAIN MCU
########################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_3E00260005504E5238363120-if00
baud: 250000
restart_method: command

[temperature_sensor BTT_SKR_MINI_E3_V3]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 85

[temperature_sensor T420]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[printer]
kinematics: cartesian
max_velocity: 200             # Conservative for TAZ 6 — raise after resonance testing
max_accel: 2000               # Raise after input shaper calibration
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5.0

[respond]
[gcode_arcs]
[pause_resume]
recover_velocity: 50
[display_status]
[exclude_object]
[firmware_retraction]
[virtual_sdcard]
path: ~/printer_data/gcodes
[force_move]
enable_force_move : True
[idle_timeout]
timeout: 2100

##########################################################################################################################################################
#   X/Y/Z Stepper Config
##########################################################################################################################################################
########################################
# X STEPPER
########################################
[stepper_x]
step_pin: PB13
dir_pin: !PB12                # Invert (remove '!') if X moves the wrong direction
enable_pin: !PB14
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 280
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.850            # TAZ 6 OEM motors are ~1.68A rated; 0.85A RMS is safe
stealthchop_threshold: 999999

########################################
# Y STEPPER
########################################
[stepper_y]
step_pin: PB10
dir_pin: PB2                  # Invert ('!PB2') if Y moves the wrong direction
enable_pin: !PB11
microsteps: 16
rotation_distance: 32         # Same pulley as X
full_steps_per_rotation: 200
endstop_pin: ^PC1
position_endstop: 280         # Endstop is at Y-MAX (rear)
position_min: 0
position_max: 280
homing_positive_dir: true     # Homes toward rear (Y-MAX)
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.850
stealthchop_threshold: 999999

########################################
# Z STEPPER
########################################
########################################
# Z AXIS
# Two Z steppers wired in parallel via Y-splitter on the Z driver output.
# Endstop is at the TOP of the gantry (Z-MAX).
#
# PARALLEL WIRING NOTE:
#   Each motor receives half the driver current. If 0.900A is set,
#   each motor sees ~0.450A. Raise to 1.200–1.400 if Z skips under load,
#   staying within the TMC2209's 2A limit.
########################################

[stepper_z]
step_pin: PB0
dir_pin: !PC5                 # Invert (remove '!') if Z moves the wrong direction
enable_pin: !PB1
microsteps: 16
rotation_distance: 2          # Derived from OEM 1600 steps/mm @ 1/16 microstep:
                              # (200 × 16) / 1600 = 2mm lead per revolution
full_steps_per_rotation: 200
endstop_pin: ^PC2
position_endstop: 250         # Z homes to the TOP; set to your actual max Z travel
position_min: -3              # Small negative allowance for probe calibration
position_max: 250
homing_positive_dir: true     # Homes UPWARD to Z-MAX endstop
homing_speed: 8
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.900
stealthchop_threshold: 999999

########################################
# EXTRUDER
########################################
# ########################################
# # DRAGON BURNER v8 TOOLHEAD (INACTIVE)
# # TZ-V6 hotend + Sherpa Mini extruder + BTT Microprobe
# ########################################

# [extruder]
# step_pin: PB3
# dir_pin: !PB4
# enable_pin: !PD2
# microsteps: 16
# rotation_distance: 22.452         # Sherpa Mini — calibrate for your build
# gear_ratio: 50:10                 # Sherpa Mini standard 5:1 ratio
# full_steps_per_rotation: 200
# nozzle_diameter: 0.400
# filament_diameter: 1.750
# heater_pin: PC8
# sensor_type: ATC Semitec 104GT-2  # TZ-V6 (Trianglelab V6) uses Semitec glass bead
# sensor_pin: PA0
# min_temp: 0
# max_temp: 280
# min_extrude_temp: 180
# max_extrude_only_distance: 200
# max_extrude_only_velocity: 60
# control: pid
# pid_Kp: 21.527
# pid_Ki: 1.063
# pid_Kd: 108.982
# pressure_advance: 0.04            # Calibrate separately for this toolhead

# [verify_heater extruder]
# max_error: 120
# check_gain_time: 30
# hysteresis: 10
# heating_gain: 2

# [tmc2209 extruder]
# uart_pin: PC11
# tx_pin: PC10
# uart_address: 3
# run_current: 0.600                # Sherpa Mini typically runs a small NEMA14 motor
# stealthchop_threshold: 0

# [probe]
# pin: ^PC14
# x_offset: 0.0    # Measure horizontal offset: probe tip relative to nozzle tip, X axis
# y_offset: 0.0    # Measure horizontal offset: probe tip relative to nozzle tip, Y axis
# z_offset: 0.0    # DO NOT set manually — run PROBE_CALIBRATE then SAVE_CONFIG
# speed: 5.0
# lift_speed: 10.0
# samples: 2
# sample_retract_dist: 3.0
# samples_result: median
# samples_tolerance: 0.010
# samples_tolerance_retries: 3

########################################
# NEPTUNE 4 PRO TOOLHEAD
# Stock N4P toolhead with BTT Microprobe
########################################

[extruder]
step_pin: PB3
dir_pin: PB4                  # Invert ('!PB4') if extruder feeds the wrong way
enable_pin: !PD2
microsteps: 32
rotation_distance: 28.888
gear_ratio: 52:10
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA0
min_temp: 0
max_temp: 330
min_extrude_temp: 180
#control = pid
#pid_kp : 26.213
#pid_ki : 1.304
#pid_kd : 131.721
pressure_advance: 0
max_extrude_cross_section: 5
instantaneous_corner_velocity: 5.0
max_extrude_only_distance: 100
max_extrude_only_velocity:45
max_extrude_only_accel:2000
step_pulse_duration:0.000002

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 10
heating_gain: 2

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.700
stealthchop_threshold: 0      # SpreadCycle (not StealthChop) for extruder —
                              # required for accurate pressure advance response

[probe]
pin: ^PC14
x_offset: 0.0    # Measure horizontal offset: probe tip relative to nozzle tip, X axis
y_offset: 0.0    # Measure horizontal offset: probe tip relative to nozzle tip, Y axis
z_offset: 0.0    # DO NOT set manually — run PROBE_CALIBRATE then SAVE_CONFIG
speed: 5.0
lift_speed: 10.0
samples: 2
sample_retract_dist: 3.0
samples_result: median
samples_tolerance: 0.010
samples_tolerance_retries: 3

##########################################################################################################################################################
#   HEATED BED CONFIG
##########################################################################################################################################################

[heater_bed]
heater_pin: PC9
sensor_type: Generic 3950     # VERIFY this matches your silicone heater thermistor
sensor_pin: PC4
min_temp: 0
max_temp: 130
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182

##########################################################################################################################################################
#   FANS Config
##########################################################################################################################################################

[fan]
pin: PC7

[fan_generic chamber_fans]
pin: PB15

[controller_fan heatbreak+mainboard_fan]
pin: PC6
fan_speed: 0.8
idle_speed: 0.3
idle_timeout: 43200
shutdown_speed: 1
heater: extruder, heater_bed
stepper: stepper_x, stepper_y, stepper_z, extruder

##########################################################################################################################################################
#   FILAMENT SENSOR Config
##########################################################################################################################################################

[filament_switch_sensor filament_sensor]
pause_on_runout: true
runout_gcode:
    PAUSE
    M117 Filament runout!
switch_pin: ^PC15
# ^PC15 = internal pull-up enabled; active HIGH = runout (open circuit, no filament)

##########################################################################################################################################################
#   LED Config
##########################################################################################################################################################
########################################
# LED STRIP
# Strip is connected to the Neopixel header's GND and 5V/PWR pins only.
# No data signal → strip is always on when the board is powered.
# No config section is required.
#
# If addressable LEDs added later, a data wire to PA8, uncomment and configure:
########################################
# [neopixel led_strip]
# pin: PA8
# chain_count: 30        # Set to your actual LED count
# color_order: GRB       # GRB for WS2812B; check your strip type
# initial_RED: 0.5
# initial_GREEN: 0.5
# initial_BLUE: 0.5


##########################################################################################################################################################
#   HOMING & LEVELING Config
##########################################################################################################################################################
########################################
# HOMING OVERRIDE
# Custom homing sequence to handle the Z-MAX endstop:
#  1. Home X (toward X-MIN)
#  2. Home Y (toward Y-MAX / rear)
#  3. Move XY to bed center
#  4. Home Z (travels UP to the top endstop)
#  5. Drop Z to a safe working height
########################################

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set do_x = 'X' in params or (not 'Y' in params and not 'Z' in params) %}
    {% set do_y = 'Y' in params or (not 'X' in params and not 'Z' in params) %}
    {% set do_z = 'Z' in params or (not 'X' in params and not 'Y' in params) %}

    G90                                     ; Ensure absolute mode

    {% if do_x %}
        G28 X                               ; Home X to X-MIN
    {% endif %}

    {% if do_y %}
        G28 Y                               ; Home Y to Y-MAX (rear)
    {% endif %}

    {% if do_z %}
        ; Move to bed center before Z homing to avoid gantry-corner collisions
        {% if not do_x %}
            G1 X140 F6000
        {% endif %}
        {% if not do_y %}
            G1 Y140 F6000
        {% endif %}
        G28 Z                               ; Home Z upward to Z-MAX endstop
        G1 Z220 F1200                       ; Drop gantry to a safe working height
    {% endif %}


########################################
# BED MESH LEVELING
########################################

[safe_z_home]
home_xy_position: 150, 150
speed: 100
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 260, 260
probe_count: 5, 5
mesh_pps: 2, 2
algorithm: bicubic
zero_reference_position: 140, 140   # Bed center — mesh is referenced here
fade_start: 1.0
fade_end: 10.0
fade_target: 0.0


########################################
# BED SCREW TRAMMING AID
########################################

[bed_screws]
screw1: 30, 30
screw1_name: Front Left
screw2: 250, 30
screw2_name: Front Right
screw3: 250, 250
screw3_name: Back Right
screw4: 30, 250
screw4_name: Back Left

########################################
# AXIS TWIST COMPENSATION
########################################
[axis_twist_compensation]
calibrate_start_x: 30           ; Probe lands at X=5.75 — just on bed
calibrate_end_x: 150            ; Probe lands at X=125.75
calibrate_y: 90                 ; Probe lands at Y=110.45

##########################################################################################################################################################
#   INPUT SHAPER + CHAMBER TEMPERATURE MONITORING Config
##########################################################################################################################################################
########################################
# ARDUINO NANO config
########################################

[mcu nano]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0        ;CHECK THE CORRECT SERIAL ID
baud: 250000

########################################
# INPUT SHAPER config
########################################

[adxl345]
cs_pin: nano:PB5
spi_software_sclk_pin: nano:PB2
spi_software_mosi_pin: nano:PB3
spi_software_miso_pin: nano:PB4

[resonance_tester]
accel_chip: adxl345
# Adjust these probe points to safe coordinates on your Taz 6 bed
probe_points:
    152, 152, 20

# [input_shaper]
# shaper_type_x: 3hump_ei
# shaper_freq_x: 80
# shaper_type_y: mzv
# shaper_freq_y: 37.4

#####################################################################
# AHT20 Chamber Temperature Config
#####################################################################
[temperature_sensor chamber]
sensor_type: AHT10
i2c_mcu: nano
i2c_bus: twi
i2c_speed: 400000

##########################################################################################################################################################
#   MACROS
##########################################################################################################################################################
#####################################################################
# Printing Macros
#####################################################################
[gcode_macro START_PRINT]
description: Standard start sequence. Pass BED_TEMP and EXTRUDER_TEMP from slicer.
gcode:
    {% set BED_TEMP          = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP     = params.EXTRUDER_TEMP|default(200)|float %}
    {% set CHAMBER_FAN_SPEED = params.CHAMBER_FAN_SPEED|default(0.5)|float %}

    M117 Heating bed...
    M140 S{BED_TEMP}                            ; Start bed — don't wait yet

    M117 Starting chamber fans...
    SET_FAN_SPEED FAN=chamber_fans SPEED={CHAMBER_FAN_SPEED}

    M117 Homing...
    G28                                         ; Home all axes

    M117 Waiting for bed...
    M190 S{BED_TEMP}                            ; Wait for bed to reach temp

    M117 Calibrating mesh...
    BED_MESH_CALIBRATE                          ; Dynamic bed leveling

    M117 Heating hotend...
    M109 S{EXTRUDER_TEMP}                       ; Wait for hotend

    G90                                         ; Absolute positioning
    G92 E0                                      ; Reset extruder
    G1 Z5 F3000
    G1 X5 Y10 F5000                             ; Move to purge start
    G1 Z0.3 F1000
    G1 X80 E12 F500                             ; Purge line
    G1 X100 E14 F500
    G92 E0                                      ; Reset extruder after purge
    G1 Z2 F3000
    M117 Printing...

[gcode_macro END_PRINT]
description: Standard end sequence.
gcode:
    {% set MAX_Y = printer.toolhead.axis_maximum.y %}

    M117 Finishing...
    G91                                         ; Relative
    G1 E-5 F3000                                ; Retract
    G1 Z15 F3000                                ; Lift
    G90                                         ; Absolute
    G1 X10 Y{MAX_Y - 10} F5000                 ; Present print at rear
    TURN_OFF_HEATERS
    M106 S0                                     ; Parts fan off
    SET_FAN_SPEED FAN=chamber_fans SPEED=0      ; Chamber fans off
    M84                                         ; Disable motors
    M117 Print complete!

[gcode_macro PAUSE]
description: Pause the running print.
rename_existing: BASE_PAUSE
gcode:
    {% set E = params.E|default(5)|float %}
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-{E} F2100                              ; Retract
    G1 Z10 F3000                                ; Lift
    G90
    G1 X10 Y10 F6000                            ; Park
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=0

[gcode_macro RESUME]
description: Resume a paused print.
rename_existing: BASE_RESUME
gcode:
    {% set E = params.E|default(5)|float %}
    G91
    G1 E{E} F2100                               ; Re-prime
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
description: Cancel the running print.
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    M106 S0
    SET_FAN_SPEED FAN=chamber_fans SPEED=0
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    BASE_CANCEL_PRINT
    END_PRINT

#####################################################################
# Chamber Fans Macros
#####################################################################

[gcode_macro CHAMBER_FANS_ON]
description: Turn on chamber heating fans. Optional SPEED=0.0–1.0 (default 0.5).
gcode:
    {% set SPEED = params.SPEED|default(0.5)|float %}
    SET_FAN_SPEED FAN=chamber_fans SPEED={SPEED}
    M117 Chamber fans: {(SPEED * 100)|int}%

[gcode_macro CHAMBER_FANS_OFF]
description: Turn off chamber heating fans.
gcode:
    SET_FAN_SPEED FAN=chamber_fans SPEED=0
    M117 Chamber fans off

#####################################################################
# Fans Macros
#####################################################################

[delayed_gcode start_fan_at_idle_speed]
initial_duration: 5.
gcode:
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=1
  G4 P2000
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0

#############################################################################
#   PID Tuning Macros
#############################################################################

[gcode_macro PID_Tune_EXTRUDER]
gcode:
  {% set temperature = params.TEMPERATURE|default(210) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=extruder TARGET={temperature}
  SAVE_CONFIG

[gcode_macro PID_Tune_BED]
gcode:
  {% set temperature = params.TEMPERATURE|default(60) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=heater_bed TARGET={temperature}
  SAVE_CONFIG

#############################################################################
#   INPUT SHAPING Macros
#############################################################################

  [gcode_macro Test_Resonances_X]
description: Tests the X axis resonances for Input Shaping
gcode: 
  G28
  TEST_RESONANCES AXIS=X
  RESPOND PREFIX="Info" MSG="If done, ssh «~/klipper/scripts/calibrate_shaper.py /tmp/resonances_x_*.csv -o /tmp/shaper_calibrate_x.png» then copy/paste the result in your printer.cfg."

[gcode_macro Test_Resonances_Y]
description: Tests the Y axis resonances for Input Shaping
gcode: 
  G28
  TEST_RESONANCES AXIS=Y
  RESPOND PREFIX="Info" MSG="If done, ssh «~/klipper/scripts/calibrate_shaper.py /tmp/resonances_y_*.csv -o /tmp/shaper_calibrate_y.png» then copy/paste the result in your printer.cfg."

#############################################################################
#   CALIBRATING and BED LEVELING Macros
#############################################################################

[gcode_macro CG28]
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
  {% endif %}

[gcode_macro Axis_Twist_Comp_Tune]
gcode:
    CG28
    AXIS_TWIST_COMPENSATION_CALIBRATE

[gcode_macro Bed_Level_Screws_Tune]
gcode:
    BED_MESH_CLEAR
    {% set current = printer.heater_bed.target|round(0) %}
    {% set target = current or 60 %}
    {% if current == 0 %}
        RESPOND PREFIX="Bed_Level_Screws_Tune" MSG="No bed target, heating to {target} °C"
        M140 S{target}
    {% else %}
        RESPOND PREFIX="Bed_Level_Screws_Tune" MSG="Waiting for bed to reach {target} °C"
    {% endif %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={target - 2} MAXIMUM={target + 5}
    CG28
    BED_SCREWS_ADJUST

[gcode_macro Calibrate_Probe_Z_Offset]
gcode:
      CG28
      PROBE_CALIBRATE
      
[gcode_macro Auto_Full_Bed_Level]
gcode:
      RESPOND PREFIX="info" MSG="Running Custom Bed Leveling Macro"
      BED_MESH_CLEAR
      SET_BED_TEMPERATURE TARGET=60
      BED_TEMPERATURE_WAIT MINIMUM=58 MAXIMUM=65
      CG28
      BED_MESH_CALIBRATE

#############################################################################
#   TESTING Macros
############################################################################# 
[gcode_macro TEST_SPEED]
description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU
gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x %}
        {% if x_min < 0 %}
            {% set x_min = 0 %}
        {% endif %}
    
        {% set y_min = printer.toolhead.axis_minimum.y %}
        {% if y_min < 0 %}
            {% set y_min = 0 %}
        {% endif %}
    
        {% set x_min = x_min + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = y_min + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 10} F{speed*60}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED