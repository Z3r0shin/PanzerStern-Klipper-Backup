#############################################################################
#   External Config Includes
#############################################################################
[include fluidd.cfg]
[include KAMP_Settings.cfg]
[include ./KAMP/Smart_Park.cfg]
[include ./KAMP/Line_Purge.cfg]
[include Macros.cfg]
[include RP2040.cfg]

#[include N4P.cfg]
[include DB.cfg]

[respond]
[gcode_arcs]
[pause_resume]
recover_velocity: 50
[display_status]
[exclude_object]
[virtual_sdcard]
path: ~/printer_data/gcodes
[force_move]
enable_force_move : True
[idle_timeout]
timeout: 2100
[aht21]

########################################
# Klipper Configuration
# Machine  : Lulzbot TAZ 6 (Klipperized)
# Host     : HP T420 Thin Client
# Board    : BTT SKR Mini E3 V3.0 (STM32G0B1)
########################################

##########################################################################################################################################################
#   Base Config
##########################################################################################################################################################
########################################
# MAIN MCU
########################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_3E00260005504E5238363120-if00
baud: 250000
restart_method: command

[temperature_sensor BTT_SKR_MINI_E3_V3]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 85
 
[printer]
kinematics: cartesian
max_velocity: 400             # Conservative for TAZ 6 — raise after resonance testing
max_accel: 4000               # Raise after input shaper calibration
max_z_velocity: 8
max_z_accel: 100
square_corner_velocity: 5.0

##########################################################################################################################################################
#   Y/Z Stepper Config
##########################################################################################################################################################
########################################
# Y STEPPER
########################################
[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 305
homing_positive_dir: false
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.850
stealthchop_threshold: 999999

########################################
# Z STEPPER
########################################
[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 2
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop   # was ^PC0
position_min: -3
position_max: 250
homing_positive_dir: false            # was true
homing_speed: 5
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 1.4
stealthchop_threshold: 0

##########################################################################################################################################################
#   HEATED BED CONFIG
##########################################################################################################################################################

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182

##########################################################################################################################################################
#   FANS Config
##########################################################################################################################################################

[fan]
pin: PC7

[fan_generic hotbed_fans]
pin: PB15

[heater_fan heatbreak_fan]
pin: PC6
fan_speed: 1
heater_temp: 50
heater: extruder
shutdown_speed: 1

##########################################################################################################################################################
#   FILAMENT SENSOR Config
##########################################################################################################################################################

[filament_switch_sensor filament_sensor]
pause_on_runout: true
insert_gcode:
    M117 Insert Detected
runout_gcode:
    M117 Runout Detected
    UNLOAD_FILAMENT
event_delay: 3.0
pause_delay: 1.0
switch_pin: ^!PC15

########################################
# INPUT SHAPER config
########################################

# For the MCU controlling the input shaping part, see RP2040.cfg

# [adxl345]
# cs_pin: rp2040:gpio9
# spi_bus: spi1a

[resonance_tester]
accel_chip: adxl345
probe_points: 160, 160, 20

[input_shaper]
shaper_type_y: mzv
shaper_freq_y: 23

