########################################
# Klipper Configuration
# Machine  : Lulzbot TAZ 6 (Klipperized)
# Host     : HP T420 Thin Client
# Board    : BTT SKR Mini E3 V3.0 (STM32G0B1)
########################################
#
# BEFORE FIRST USE — MANDATORY STEPS:
#  1. Find your serial ID:    ls /dev/serial/by-id/
#     Update [mcu] serial below with your actual ID.
#  2. Verify dir_pin polarity for each axis by moving each axis
#     a short distance and checking direction. Invert with '!'
#     prefix if backwards.
#  3. Verify your thermistor types match the hardware. Wrong
#     types can cause thermal runaway.
#  4. Calibrate extruder rotation_distance before printing.
#  5. Run PID_CALIBRATE for both hotend and bed.
#  6. Run PROBE_CALIBRATE to set Z offset.
#  7. Verify probe pin polarity — change ^PC14 to ^!PC14 if
#     probe never triggers or is always triggered.
#
########################################

##########################################################################################################################################################
#   Base Config
##########################################################################################################################################################
########################################
# MAIN MCU
########################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_3E00260005504E5238363120-if00
baud: 250000
restart_method: command

[temperature_sensor BTT_SKR_MINI_E3_V3]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 85

[printer]
kinematics: cartesian
max_velocity: 300             # Conservative for TAZ 6 — raise after resonance testing
max_accel: 3000               # Raise after input shaper calibration
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[respond]
[gcode_arcs]
[pause_resume]
recover_velocity: 50
[display_status]
[exclude_object]
[firmware_retraction]
[virtual_sdcard]
path: ~/printer_data/gcodes
[force_move]
enable_force_move : True
[idle_timeout]
timeout: 2100

##########################################################################################################################################################
#   Y/Z Stepper Config
##########################################################################################################################################################
########################################
# Y STEPPER
########################################
[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 319
homing_positive_dir: false
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.850
stealthchop_threshold: 999999

########################################
# Z STEPPER
########################################
########################################
# Z AXIS
# Two Z steppers wired in parallel via Y-splitter on the Z driver output.
# Endstop is at the TOP of the gantry (Z-MAX).
#
# PARALLEL WIRING NOTE:
#   Each motor receives half the driver current. If 0.900A is set,
#   each motor sees ~0.450A. Raise to 1.200–1.400 if Z skips under load,
#   staying within the TMC2209's 2A limit.
########################################

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 2
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop   # was ^PC0
position_min: -3
position_max: 250
homing_positive_dir: false            # was true
homing_speed: 8
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 1.40
stealthchop_threshold: 999999

##########################################################################################################################################################
#   HEATED BED CONFIG
##########################################################################################################################################################

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182

##########################################################################################################################################################
#   FANS Config
##########################################################################################################################################################

[fan]
pin: PC7

[fan_generic hotbed_fans]
pin: PB15

[heater_fan heatbreak_fan]
pin: PC6
fan_speed: 0.6
heater_temp: 50
heater: extruder
shutdown_speed: 1

##########################################################################################################################################################
#   FILAMENT SENSOR Config
##########################################################################################################################################################

[filament_switch_sensor filament_sensor]
pause_on_runout: true
insert_gcode:
    M117 Insert Detected
runout_gcode:
    M117 Runout Detected
    UNLOAD_FILAMENT
event_delay: 3.0
pause_delay: 1.0
switch_pin: ^PC15

[delayed_gcode DISABLE_FILAMENT_SENSOR]
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  25
variable_purge_distance:  30
gcode:
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={200-4} MAXIMUM={200+40}
  {% set speed = params.SPEED|default(300) %}
  {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 30 %}
  SAVE_GCODE_STATE NAME=load_state
  G91
  G92 E0
  G1 E{load_distance} F{max_velocity}          ; fast-load
  G1 E{purge_distance} F{speed}                ; purge
  RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  55
variable_purge_distance:  15
gcode:
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=200
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={200-4} MAXIMUM={200+40}
  {% set speed = params.SPEED|default(300) %}
  {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 30 %}
  SAVE_GCODE_STATE NAME=unload_state
  G91
  G92 E0
  G1 E{purge_distance} F{speed}                ; purge
  G1 E-{unload_distance} F{max_velocity}       ; fast-unload
  RESTORE_GCODE_STATE NAME=unload_state
  
##########################################################################################################################################################
#   LED Config
##########################################################################################################################################################
########################################
# LED STRIP
# Strip is connected to the Neopixel header's GND and 5V/PWR pins only.
# No data signal → strip is always on when the board is powered.
# No config section is required.
#
# If addressable LEDs added later, a data wire to PA8, uncomment and configure:
########################################
# [neopixel led_strip]
# pin: PA8
# chain_count: 30        # Set to your actual LED count
# color_order: GRB       # GRB for WS2812B; check your strip type
# initial_RED: 0.5
# initial_GREEN: 0.5
# initial_BLUE: 0.5


##########################################################################################################################################################
#   HOMING & LEVELING Config
##########################################################################################################################################################
########################################
# HOMING OVERRIDE
# Custom homing sequence to handle the Z-MAX endstop:
#  1. Home X (toward X-MIN)
#  2. Home Y (toward Y-MAX / rear)
#  3. Move XY to bed center
#  4. Home Z (travels UP to the top endstop)
#  5. Drop Z to a safe working height
########################################

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set do_x = 'X' in params or (not 'Y' in params and not 'Z' in params) %}
    {% set do_y = 'Y' in params or (not 'X' in params and not 'Z' in params) %}
    {% set do_z = 'Z' in params or (not 'X' in params and not 'Y' in params) %}

    G90

    {% if do_z %}
        G0 Z10 F600          ; lift 10mm before any XY move — clears the bed
    {% endif %}

    {% if do_x %}
        G28 X
    {% endif %}

    {% if do_y %}
        G28 Y
    {% endif %}

    {% if do_z %}
        {% if "x" not in printer.toolhead.homed_axes %}
            G28 X
        {% endif %}
        {% if "y" not in printer.toolhead.homed_axes %}
            G28 Y
        {% endif %}
        G0 X155 Y155 F6000   ; move to bed center (adjust to your actual center)
        G28 Z                ; probe the bed
        G0 Z10 F600          ; lift off the bed after probing
    {% endif %}


##########################################################################################################################################################
#   INPUT SHAPER + CHAMBER TEMPERATURE MONITORING Config
##########################################################################################################################################################
########################################
# ARDUINO NANO config
########################################

# [mcu nano]
# serial: /dev/serial/by-id/usb-1a86_USB2.0-Ser_-if00-port0
