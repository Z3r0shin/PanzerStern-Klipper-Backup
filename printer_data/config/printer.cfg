##########################################################################################################################################################
#   MACROS
##########################################################################################################################################################
#####################################################################
# Printing Macros
#####################################################################
[gcode_macro PRINT_START]
description: >
  Standard start sequence.
  Slicer must pass BED_TEMP and EXTRUDER_TEMP.
  Pass CHAMBER_TEMP only when chamber heating is desired — fans will not
  run at all if CHAMBER_TEMP is 0 or omitted.
  Optional CHAMBER_FAN_SPEED (0.0–1.0, default 1.0) sets fan duty during heat soak.
gcode:
    {% set BED_TEMP           = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP      = params.EXTRUDER_TEMP|default(200)|float %}
    {% set CHAMBER_TEMP       = params.CHAMBER_TEMP|default(0)|float %}
    {% set CHAMBER_FAN_SPEED  = params.CHAMBER_FAN_SPEED|default(1.0)|float %}
    {% set HEAT_CHAMBER       = CHAMBER_TEMP > 0 %}

    M117 Heating bed...
    M140 S{BED_TEMP}                                        ; start bed, do not wait yet

    {% if HEAT_CHAMBER %}
        M117 Chamber fans on — target {CHAMBER_TEMP|int} °C
        SET_FAN_SPEED FAN=chamber_fans SPEED={CHAMBER_FAN_SPEED}
    {% endif %}

    M117 Homing...
    G28                                                     ; full home (homing_override handles Z-MAX)

    M117 Waiting for bed ({BED_TEMP|int} °C)...
    M190 S{BED_TEMP}                                        ; wait for bed — needed before mesh

    {% if HEAT_CHAMBER %}
        M117 Heat soak — waiting for chamber ({CHAMBER_TEMP|int} °C)...
        TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={CHAMBER_TEMP}
        M117 Chamber ready.
    {% endif %}

    M117 Adaptive bed mesh...
    BED_MESH_CALIBRATE                                      ; KAMP intercepts this for adaptive mesh

    SMART_PARK                                              ; park near print area before heating hotend

    M117 Heating hotend ({EXTRUDER_TEMP|int} °C)...
    M109 S{EXTRUDER_TEMP}                                   ; wait for hotend — after mesh to avoid ooze

    LINE_PURGE                                              ; KAMP adaptive purge line

    G90                                                     ; absolute positioning
    G92 E0                                                  ; reset extruder
    M117 Printing...

[gcode_macro PRINT_END]
description: Standard end sequence.
gcode:
    {% set MAX_Y = printer.toolhead.axis_maximum.y %}

    M117 Finishing...
    G91                                         ; relative
    G1 E-5 F3000                                ; retract
    G1 Z15 F3000                                ; lift
    G90                                         ; absolute
    G1 X10 Y{MAX_Y - 10} F5000                 ; present print at rear
    TURN_OFF_HEATERS
    M106 S0                                     ; parts fan off
    SET_FAN_SPEED FAN=chamber_fans SPEED=0      ; chamber fans off (no-op if already off)
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
    M84                                         ; disable motors
    M117 Print complete!

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
  {% set z = params.Z|default(30)|int %}
  {% if printer['pause_resume'].is_paused|int == 0 %}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target|default(220)}
      SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=prev_temp VALUE={printer['extruder'].target|default(220)}
      SET_GCODE_VARIABLE MACRO=UNLOAD_FILAMENT VARIABLE=prev_temp VALUE={printer['extruder'].target|default(220)}
      SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}
      SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
      SAVE_GCODE_STATE NAME=PAUSE
      BASE_PAUSE
      G91
      {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}
          G1 E-2 F2700
          G1 X3 Y3 F3000
          G1 E-2 Z{z} F1600
          SAVE_GCODE_STATE NAME=ZLIFT
      {% else %}
          { action_respond_info("Pause zhop exceeds maximum Z height.") }
          SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
          G1 E-2 F2700
          G1 X3 Y3 F3000
          G1 E-2 F1600
          SAVE_GCODE_STATE NAME=ZLIFT
      {% endif %}
      G90
      G1 X{printer.toolhead.axis_minimum.x+5} Y{printer.toolhead.axis_maximum.y-5} F6000
      SAVE_GCODE_STATE NAME=PAUSEPARK
      SET_HEATER_TEMPERATURE HEATER=extruder TARGET=175
      SET_IDLE_TIMEOUT TIMEOUT=43200
  {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
  {% if printer['pause_resume'].is_paused|int == 1 %}
      SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1                           ; enable filament sensor
      SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}   ; set timeout back to configured value
      {% if etemp > 0 %}
          SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp|int}
          TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp|int - 4} MAXIMUM={etemp|int + 10}  ; wait for hotend to heat back up to print temp
      {% endif %}
      RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100                      ; go back to park position in case toolhead was moved during pause                                                                        ; enable extruder stepper motor
      G91                                                                           ; relative positioning
      M83                                                                           ; set extruder to relative mode
      G1 E80  F200                                                                  ; extrude 80mm of filament to prime the nozzle
      G4 P2000                                                                      ; wait for 2 seconds to stabilise pressure
      G1 X20 F15000                                                                 ; wiggle movement to ensure free movement of purge
      G1 X-20
      G1 X20
      G1 X-20
      G1 X20
      G1 X-20
      RESTORE_GCODE_STATE NAME=ZLIFT MOVE=1 MOVE_SPEED=60                           ; restore to the zlift position above the print
      G1 X-3 Y-3 F3000                                                              ; Undo the pause Wipe out 
      G1 Z{zhop * -1} F900  
      RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60                           ; restore to the paused position (lowers to final print location)
      M400                                                                          ; wait for all moves to complete
      BASE_RESUME                                                                   ; resume print
  {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
  SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}      ; set timeout back to configured value
  CLEAR_PAUSE
  SDCARD_RESET_FILE
  PRINT_END
  BASE_CANCEL_PRINT

#####################################################################
# Chamber Fans Macros
#####################################################################

[gcode_macro CHAMBER_FANS_ON]
description: Turn on chamber heating fans. Optional SPEED=0.0–1.0 (default 0.5).
gcode:
    {% set SPEED = params.SPEED|default(0.5)|float %}
    SET_FAN_SPEED FAN=chamber_fans SPEED={SPEED}
    M117 Chamber fans: {(SPEED * 100)|int}%

[gcode_macro CHAMBER_FANS_OFF]
description: Turn off chamber heating fans.
gcode:
    SET_FAN_SPEED FAN=chamber_fans SPEED=0
    M117 Chamber fans off

#####################################################################
# Fans Macros
#####################################################################

[delayed_gcode start_fan_at_idle_speed]
initial_duration: 5.
gcode:
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=1
  G4 P2000
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0

#############################################################################
#   PID Tuning Macros
#############################################################################

[gcode_macro PID_Tune_EXTRUDER]
gcode:
  {% set temperature = params.TEMPERATURE|default(210) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=extruder TARGET={temperature}
  SAVE_CONFIG

[gcode_macro PID_Tune_BED]
gcode:
  {% set temperature = params.TEMPERATURE|default(60) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=heater_bed TARGET={temperature}
  SAVE_CONFIG

#############################################################################
#   INPUT SHAPING Macros
#############################################################################

[gcode_macro Test_Resonances_X]
description: Tests the X axis resonances for Input Shaping
gcode: 
  G28
  TEST_RESONANCES AXIS=X
  RESPOND PREFIX="Info" MSG="If done, ssh «~/klipper/scripts/calibrate_shaper.py /tmp/resonances_x_*.csv -o /tmp/shaper_calibrate_x.png» then copy/paste the result in your printer.cfg."

[gcode_macro Test_Resonances_Y]
description: Tests the Y axis resonances for Input Shaping
gcode: 
  G28
  TEST_RESONANCES AXIS=Y
  RESPOND PREFIX="Info" MSG="If done, ssh «~/klipper/scripts/calibrate_shaper.py /tmp/resonances_y_*.csv -o /tmp/shaper_calibrate_y.png» then copy/paste the result in your printer.cfg."

#############################################################################
#   CALIBRATING and BED LEVELING Macros
#############################################################################

[gcode_macro CG28]
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
  {% endif %}

[gcode_macro Axis_Twist_Comp_Tune]
gcode:
    CG28
    AXIS_TWIST_COMPENSATION_CALIBRATE

[gcode_macro Bed_Level_Screws_Tune]
gcode:
    BED_MESH_CLEAR
    {% set current = printer.heater_bed.target|round(0) %}
    {% set target = current or 60 %}
    {% if current == 0 %}
        RESPOND PREFIX="Bed_Level_Screws_Tune" MSG="No bed target, heating to {target} °C"
        M140 S{target}
    {% else %}
        RESPOND PREFIX="Bed_Level_Screws_Tune" MSG="Waiting for bed to reach {target} °C"
    {% endif %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={target - 2} MAXIMUM={target + 5}
    CG28
    BED_SCREWS_ADJUST

[gcode_macro Calibrate_Probe_Z_Offset]
gcode:
      CG28
      PROBE_CALIBRATE
      
[gcode_macro Auto_Full_Bed_Level]
gcode:
      RESPOND PREFIX="info" MSG="Running Custom Bed Leveling Macro"
      BED_MESH_CLEAR
      M140 S60
      TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=65
      CG28
      BED_MESH_CALIBRATE

#############################################################################
#   TESTING Macros
############################################################################# 
[gcode_macro TEST_SPEED]
description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU
gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x %}
        {% if x_min < 0 %}
            {% set x_min = 0 %}
        {% endif %}
    
        {% set y_min = printer.toolhead.axis_minimum.y %}
        {% if y_min < 0 %}
            {% set y_min = 0 %}
        {% endif %}
    
        {% set x_min = x_min + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = y_min + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 10} F{speed*60}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED

