########################################
# RP2040 MCU — Toolhead Sensors
########################################
#
# I2C bus layout:
#   i2c0b  (gpio4 SDA / gpio5 SCL)  →  AHT21 + ENS160
#   i2c1a  (gpio2 SDA / gpio3 SCL)  →  BTT Eddy Coil (LDC1612)
#
# Thermistors (NTC 100K glass-bulb, pulled up to 3V3 via 4.7 kΩ):
#   gpio26 (ADC0)  →  Eddy coil PCB thermistor  (drift compensation)
#   gpio27 (ADC1)  →  Heatsink thermistor       (monitoring)

# Calling aht21 before anything else so the ens160's custom script works
[aht21]

[mcu rp2040]
serial: /dev/serial/by-id/usb-Klipper_rp2040_E664B4950751542E-if00

########################################
# Temperature and Air Quality Sensors (AHT21 + ENS160)
########################################
[temperature_sensor chamber_temp]
sensor_type: AHT21
i2c_mcu: rp2040
i2c_bus: i2c0b
i2c_speed: 100000

[ens160 chamber_voc]
i2c_mcu: rp2040
i2c_bus: i2c0b
i2c_speed: 100000
temperature_sensor: aht21 chamber_temp
report_time: 5
csv_basename: /tmp/ens160_chamber

########################################
# ADXL345 via SPI
########################################
[adxl345]
cs_pin: rp2040:gpio9
spi_bus: spi1a

########################################
# BTT Eddy Thermal Drift Compensation
########################################
# The [temperature_probe] section MUST share its name with the
# [probe_eddy_current] section in DB.cfg for drift compensation
# to be linked.  Both are named "btt_eddy".
#
# The NTC 100K glass-bulb thermistor glued to the Eddy coil PCB
# is connected to an ADC pin on the RP2040.
#
# NOTE: calibration_position should be a stable point on your bed
#       (e.g. above a bed screw) for repeatable drift calibration.
 
[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: rp2040:gpio26
horizontal_move_z: 2
calibration_position: 155, 152, 1  # Uncomment and set to bed centre (nozzle coords) once known
calibration_extruder_temp: 150     # Uncomment to automate drift cal heating
extruder_heating_z: 50             # Z height while heating extruder before drift cal
calibration_bed_temp: 110          # Max safe bed temp for drift cal — uncomment for ABS
max_validation_temp: 110           # Recommended if printer is enclosed
 
########################################
# Heatsink Thermistor
########################################
# Mainly to monitor the heatsink's temp, making sure it doesn't melt everything
 
[temperature_sensor heatsink_temp]
sensor_type: Generic 3950
sensor_pin: rp2040:gpio27
min_temp: 0
max_temp: 120