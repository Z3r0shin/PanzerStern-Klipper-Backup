[include autotune_tmc_N4P.cfg]

########################################
# X Stepper Config
########################################
[stepper_x]
step_pin: PB13
dir_pin: PB12                # Invert (remove '!') if X moves the wrong direction
enable_pin: !PB14
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC2
position_endstop: 0
position_min: 0
position_max: 316
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.850            # TAZ 6 OEM motors are ~1.68A rated; 0.85A RMS is safe
stealthchop_threshold: 999999

########################################
# EXTRUDER Config
########################################
[extruder]
step_pin: PB3
dir_pin: PB4                  # Invert ('!PB4') if extruder feeds the wrong way
enable_pin: !PD2
microsteps: 32
rotation_distance: 28.888
gear_ratio: 52:10
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA0
min_temp: 0
max_temp: 330
min_extrude_temp: 180
control = pid
pid_kp : 20.727
pid_ki : 1.268
pid_kd : 84.721
pressure_advance: 0
max_extrude_cross_section: 5
instantaneous_corner_velocity: 5.0
max_extrude_only_distance: 100
max_extrude_only_velocity:45
max_extrude_only_accel:2000
step_pulse_duration:0.000002

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 10
heating_gain: 2

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.700
stealthchop_threshold: 0      # SpreadCycle (not StealthChop) for extruder —
                              # required for accurate pressure advance response

########################################
# PROBE Config
########################################

[gcode_macro PROBE_DOWN]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[gcode_macro PROBE_UP]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

[output_pin probe_enable]
pin: PA1
value: 0

[probe]
pin: ^!PC14
deactivate_on_each_sample: False
speed: 5.0
lift_speed: 10.0
samples: 2
sample_retract_dist: 3.0
samples_result: median
samples_tolerance: 0.010
samples_tolerance_retries: 3
x_offset: 0.0
y_offset: -26.5
z_offset: 0.0
activate_gcode:
    PROBE_DOWN
    G4 P500
deactivate_gcode:
    PROBE_UP

########################################
# BED MESH LEVELING
########################################

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 30
mesh_max: 285, 300
probe_count: 5, 5
mesh_pps: 2, 2
algorithm: bicubic
zero_reference_position: 155, 155   # Bed center — mesh is referenced here
fade_start: 1.0
fade_end: 10.0
fade_target: 0.0

########################################
# BED SCREW TRAMMING AID
########################################

[bed_screws]
screw1: 30, 30
screw1_name: Front Left
screw2: 250, 30
screw2_name: Front Right
screw3: 250, 250
screw3_name: Back Right
screw4: 30, 250
screw4_name: Back Left

########################################
# AXIS TWIST COMPENSATION
########################################
[axis_twist_compensation]
calibrate_start_x: 30           ; Probe lands at X=5.75 — just on bed
calibrate_end_x: 150            ; Probe lands at X=125.75
calibrate_y: 90                 ; Probe lands at Y=110.45

########################################
# INPUT SHAPER
########################################

# [input_shaper]
# shaper_type_x: 3hump_ei
# shaper_freq_x: 80
# shaper_type_y: mzv
# shaper_freq_y: 37.4



[motor_constants elegoo-bj36d12-04v05]
resistance: 2.00
inductance: 0.0012
holding_torque: 0.100
max_current: 1.0
steps_per_revolution: 200