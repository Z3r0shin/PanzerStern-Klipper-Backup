##################################################################################################################################################################################################################
##
## CALIBRATION MACROS
##
##################################################################################################################################################################################################################
######################################################################
## INPUT SHAPING
######################################################################
[gcode_macro QUERY_ACCELEROMETER]
gcode:
    ACCELEROMETER_QUERY

[gcode_macro Test_Resonances_X]
description: Test the X axis resonances for Input Shaping
gcode: 
  CG28
  TEST_RESONANCES AXIS=X
  {action_respond_info("If done, ssh ~/klipper/scripts/calibrate_shaper.py /tmp/resonances_x_*.csv -o /tmp/shaper_calibrate_x.png then copy/paste the result in your printer.cfg.")}

[gcode_macro Test_Resonances_Y]
description: Test the Y axis resonances for Input Shaping
gcode: 
  CG28
  TEST_RESONANCES AXIS=Y
    {action_respond_info("If done, ssh ~/klipper/scripts/calibrate_shaper.py /tmp/resonances_y_*.csv -o /tmp/shaper_calibrate_y.png then copy/paste the result in your printer.cfg.")}

######################################################################
## SPEED TEST
######################################################################
[gcode_macro TEST_SPEED]
gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = printer.toolhead.axis_minimum.y + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 10} F{speed*60}

    # Set new limits
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}

    {% for i in range(iterations) %}
        # Large pattern
            # Diagonals
            G0 X{x_min} Y{y_min} F{speed*60}
            G0 X{x_max} Y{y_max} F{speed*60}
            G0 X{x_min} Y{y_min} F{speed*60}
            G0 X{x_max} Y{y_min} F{speed*60}
            G0 X{x_min} Y{y_max} F{speed*60}
            G0 X{x_max} Y{y_min} F{speed*60}
            
            # Box
            G0 X{x_min} Y{y_min} F{speed*60}
            G0 X{x_min} Y{y_max} F{speed*60}
            G0 X{x_max} Y{y_max} F{speed*60}
            G0 X{x_max} Y{y_min} F{speed*60}
        
        # Small pattern
            # Small diagonals 
            G0 X{x_center_min} Y{y_center_min} F{speed*60}
            G0 X{x_center_max} Y{y_center_max} F{speed*60}
            G0 X{x_center_min} Y{y_center_min} F{speed*60}
            G0 X{x_center_max} Y{y_center_min} F{speed*60}
            G0 X{x_center_min} Y{y_center_max} F{speed*60}
            G0 X{x_center_max} Y{y_center_min} F{speed*60}
            
            # Small box
            G0 X{x_center_min} Y{y_center_min} F{speed*60}
            G0 X{x_center_min} Y{y_center_max} F{speed*60}
            G0 X{x_center_max} Y{y_center_max} F{speed*60}
            G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel} 

    # Re-home and get position again for comparison:
        G28
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED

######################################################################
## PID MACRO
######################################################################
[gcode_macro PID_Tune_EXTRUDER]
gcode:
  {% set temperature = params.TEMPERATURE|default(210) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=extruder TARGET={temperature}
  SAVE_CONFIG

[gcode_macro PID_Tune_BED]
gcode:
  {% set temperature = params.TEMPERATURE|default(60) %}
  CG28
  M106 S255
  PID_CALIBRATE HEATER=heater_bed TARGET={temperature}
  SAVE_CONFIG

######################################################################
## E STEPS CALIBRATION
######################################################################
[gcode_macro EXTRUDE_100]
description: Extrude 100mm of filament at 5mm/s
gcode:
    {% if printer.extruder.can_extrude %}
        M83                          ; relative extrusion mode
        G1 E100 F300                 ; extrude 100mm at 5mm/s (300mm/min)
        M82                          ; restore absolute extrusion mode
    {% else %}
        {action_respond_info("Extruder not hot enough to extrude. Heat it up first.")}
    {% endif %}

######################################################################
## BTT EDDY CALIBRATION HELPERS
######################################################################
# IMPORTANT — Initial calibration order:
#   1. Calibrate_Eddy_Drive_Current    →  SAVE_CONFIG
#   2. Calibrate_Eddy_Current          →  SAVE_CONFIG
#   3. Measure & set x_offset / y_offset, SAVE_CONFIG
#   4. (Optional) Calibrate_Eddy_Thermal_Drift  →  SAVE_CONFIG
#
# Steps 1 & 2 do NOT home Z — they can't, because Z uses the Eddy
# as its endstop and the Eddy isn't calibrated yet.  Instead they
# home X/Y only and use SET_KINEMATIC_POSITION to fake Z=0, then
# jog upward.  Make sure the toolhead is NOT sitting on the bed
# before running these — manually lift the gantry a few mm if needed.
 
[gcode_macro Calibrate_Eddy_Drive_Current]
description: Step 1 — Calibrate Eddy drive current. Eddy must be ~20 mm above bed.
gcode:
    {action_respond_info("Step 1: Drive current calibration.")}
    {action_respond_info("Homing X/Y only — Z is faked via SET_KINEMATIC_POSITION.")}
    {action_respond_info("Make sure the toolhead is NOT sitting on the bed!")}
    G28 X Y                                     ; home X and Y only — no Z
    SET_KINEMATIC_POSITION Z=0                  ; fake Z=0 so we can jog
    G90
    G0 Z20 F600                                 ; lift to ~20 mm (slow — we're blind)
    G0 X155 Y152 F6000                          ; move to bed centre
    LDC_CALIBRATE_DRIVE_CURRENT CHIP=btt_eddy
    {action_respond_info("Drive current calibrated. Run SAVE_CONFIG now.")}
 
[gcode_macro Calibrate_Eddy_Current]
description: Step 2 — Map Eddy frequency→Z height (paper test). Drive current must be saved first!
gcode:
    {action_respond_info("Step 2: Frequency-to-height mapping.")}
    {action_respond_info("Homing X/Y only — Z is faked via SET_KINEMATIC_POSITION.")}
    {action_respond_info("Make sure the toolhead is NOT sitting on the bed!")}
    G28 X Y                                     ; home X and Y only — no Z
    SET_KINEMATIC_POSITION Z=0                  ; fake Z=0 so we can jog
    G90
    G0 Z20 F600                                 ; lift to safe height
    G0 X155 Y152 F6000                          ; move to bed centre
    BED_MESH_CLEAR
    PROBE_EDDY_CURRENT_CALIBRATE CHIP=btt_eddy
    {action_respond_info("When the paper test & mapping are done, run SAVE_CONFIG.")}
 
[gcode_macro Calibrate_Eddy_Thermal_Drift]
description: Step 4 — Thermal drift compensation (start COLD). Eddy must be fully calibrated first.
gcode:
    {% set TARGET = params.TARGET|default(60)|int %}
    {% set STEP   = params.STEP|default(2)|int %}
    {action_respond_info("Step 4: Thermal drift calibration.  TARGET=%d  STEP=%d" % (TARGET, STEP))}
    {action_respond_info("Printer must be COLD.  Bed + nozzle will be heated during the process.")}
    CG28                                         ; full home — safe now, Eddy is calibrated
    BED_MESH_CLEAR
    G90
    G0 X155 Y152 Z5 F6000                       ; position above bed centre
    SET_IDLE_TIMEOUT TIMEOUT=36000               ; 10 h — drift cal takes a while
    TEMPERATURE_PROBE_CALIBRATE PROBE=btt_eddy TARGET={TARGET} STEP={STEP}
    {action_respond_info("Follow the paper-test prompts at each temperature step.")}
    {action_respond_info("When done, run SAVE_CONFIG.")}

##################################################################################################################################################################################################################
##
## LEVELING MACROS
##
##################################################################################################################################################################################################################
######################################################################
## CONDITIONNAL HOMING
######################################################################
[gcode_macro CG28]
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
      G28
  {% endif %}

######################################################################
## HOMING OVERRIDE
######################################################################
[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set do_x = 'X' in params or (not 'Y' in params and not 'Z' in params) %}
    {% set do_y = 'Y' in params or (not 'X' in params and not 'Z' in params) %}
    {% set do_z = 'Z' in params or (not 'X' in params and not 'Y' in params) %}

    G90

    {% if do_z %}
        G0 Z10 F600          ; lift 10mm before any XY move — clears the bed
    {% endif %}

    {% if do_x %}
        G28 X
    {% endif %}

    {% if do_y %}
        G28 Y
    {% endif %}

    {% if do_z %}
        {% if "x" not in printer.toolhead.homed_axes %}
            G28 X
        {% endif %}
        {% if "y" not in printer.toolhead.homed_axes %}
            G28 Y
        {% endif %}
        G0 X127.8 Y158.4 F6000   ; move to bed center (adjust to your actual center)
        G28 Z                ; probe the bed
        G0 Z10 F600          ; lift off the bed after probing
        # ── Eddy homing offset correction ─────────────────────────
        SET_Z_FROM_PROBE         ; probe once more and fix the Z offset
    {% endif %}

# ######################################################################
# ## PROBE Z-OFFSET CALIBRATION
# ######################################################################
# [gcode_macro Calibrate_Probe_Z_Offset]
# gcode:
#       G28
#       PROBE_CALIBRATE

######################################################################
## PROBE Z-OFFSET CALIBRATION  (Eddy version)
######################################################################
[gcode_macro Calibrate_Probe_Z_Offset]
description: Run PROBE_EDDY_CURRENT_CALIBRATE for the BTT Eddy
gcode:
      G28
      BED_MESH_CLEAR
      PROBE_EDDY_CURRENT_CALIBRATE CHIP=btt_eddy

######################################################################
## FULL BED LEVEL
######################################################################
[gcode_macro Auto_Full_Bed_Level]
gcode:
      RESPOND PREFIX="info" MSG="Running Custom Bed Leveling Macro"
      BED_MESH_CLEAR
      SET_BED_TEMPERATURE TARGET=60
      BED_TEMPERATURE_WAIT MINIMUM=58 MAXIMUM=65
      CG28
      BED_MESH_CALIBRATE METHOD=scan

[gcode_macro Auto_Full_Bed_Level_STD]
gcode:
      RESPOND PREFIX="info" MSG="Running Custom Bed Leveling Macro"
      BED_MESH_CLEAR
      SET_BED_TEMPERATURE TARGET=60
      BED_TEMPERATURE_WAIT MINIMUM=58 MAXIMUM=65
      CG28
      BED_MESH_CALIBRATE 

######################################################################
## AXIS TWIST COMPENSATION TUNING
######################################################################
[gcode_macro Axis_Twist_Comp_Tune]
gcode:
    CG28
    AXIS_TWIST_COMPENSATION_CALIBRATE

######################################################################
## BED SCREWS TILT TUNING
######################################################################
[gcode_macro Bed_Level_Screws_Tune]
gcode:
    BED_MESH_CLEAR
    {% set current = printer.heater_bed.target|round(0) %}
    {% set target = current or 60 %}
    {% if current == 0 %}
        RESPOND PREFIX="SCREWS_TILT_CALCULATE" MSG="No bed target, heating to {target} °C"
        M140 S{target}
    {% else %}
        RESPOND PREFIX="SCREWS_TILT_CALCULATE" MSG="Waiting for bed to reach {target} °C"
    {% endif %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={target - 2} MAXIMUM={target + 5}
    CG28
    SCREWS_TILT_CALCULATE

##################################################################################################################################################################################################################
##
## BTT EDDY HOMING CORRECTION MACROS
##
##################################################################################################################################################################################################################
######################################################################
## EDDY Z-OFFSET RELOAD
## Klipper's Eddy homing has an inherent offset error vs probing.
## These macros correct it after every Z home.
## Requires [force_move] enable_force_move: True in config.
######################################################################
[gcode_macro _RELOAD_Z_OFFSET_FROM_PROBE]
description: Correct Z position using last probe result (Eddy homing offset fix)
gcode:
    {% set Z = printer.toolhead.position.z %}
    SET_KINEMATIC_POSITION Z={Z - printer.probe.last_probe_position.z}
 
[gcode_macro SET_Z_FROM_PROBE]
description: Probe once and reload the Z offset (call after homing Z)
gcode:
    {% set METHOD = params.METHOD | default("automatic") %}
    PROBE METHOD={METHOD}
    _RELOAD_Z_OFFSET_FROM_PROBE
    G0 Z5


