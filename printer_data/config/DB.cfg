[include autotune_tmc_DB.cfg]
########################################
# X Stepper Config
########################################
[stepper_x]
step_pin: PB13
dir_pin: PB12                # Invert (remove '!') if X moves the wrong direction
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: ^PC2
position_endstop: 0
position_min: 0
position_max: 310
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.850          # Max current for the moons-ms17hd6p420I-04 is 2A
stealthchop_threshold: 999999

########################################
# EXTRUDER Config
########################################
[thermistor TZ_V6]
temperature1: 30.5
resistance1: 78674
temperature2: 120.0
resistance2: 1803
temperature3: 241.5
resistance3: 106

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 21.978         # Sherpa Mini — calibrate for your build
gear_ratio: 50:10                 # Sherpa Mini standard 5:1 ratio
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: TZ_V6
sensor_pin: PA0
min_temp: 0
max_temp: 330
min_extrude_temp: 180
max_extrude_only_distance: 200
max_extrude_only_velocity: 60
max_extrude_cross_section: 5
control: pid
pid_Kp=42.054 
pid_Ki=5.841 
pid_Kd=75.697
pressure_advance: 0.02
pressure_advance_smooth_time: 0.02

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 10
heating_gain: 2

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650                # Sherpa Mini typically runs a small NEMA14 motor
interpolate: False

