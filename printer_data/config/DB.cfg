[include autotune_tmc_DB.cfg]

########################################
# X Stepper Config
########################################
[stepper_x]
step_pin: PB13
dir_pin: !PB12                # Invert (remove '!') if X moves the wrong direction
enable_pin: !PB14
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 307
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.850            # TAZ 6 OEM motors are ~1.68A rated; 0.85A RMS is safe
stealthchop_threshold: 999999

########################################
# EXTRUDER Config
########################################
[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
rotation_distance: 22.452         # Sherpa Mini — calibrate for your build
gear_ratio: 50:10                 # Sherpa Mini standard 5:1 ratio
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: ATC Semitec 104GT-2  # TZ-V6 (Trianglelab V6) uses Semitec glass bead
sensor_pin: PA0
min_temp: 0
max_temp: 280
min_extrude_temp: 180
max_extrude_only_distance: 200
max_extrude_only_velocity: 60
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
pressure_advance: 0.04            # Calibrate separately for this toolhead

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 10
heating_gain: 2

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.600                # Sherpa Mini typically runs a small NEMA14 motor
stealthchop_threshold: 0

########################################
# PROBE Config
########################################

[probe]
pin: ^PC14
x_offset: 32.15
y_offset: -13.36
z_offset: 0.0    # DO NOT set manually — run PROBE_CALIBRATE then SAVE_CONFIG
speed: 5.0
lift_speed: 10.0
samples: 2
sample_retract_dist: 3.0
samples_result: median
samples_tolerance: 0.010
samples_tolerance_retries: 3

########################################
# BED MESH LEVELING
########################################

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 260, 260
probe_count: 5, 5
mesh_pps: 2, 2
algorithm: bicubic
zero_reference_position: 140, 140   # Bed center — mesh is referenced here
fade_start: 1.0
fade_end: 10.0
fade_target: 0.0

########################################
# BED SCREW TRAMMING AID
########################################

[bed_screws]
screw1: 30, 30
screw1_name: Front Left
screw2: 250, 30
screw2_name: Front Right
screw3: 250, 250
screw3_name: Back Right
screw4: 30, 250
screw4_name: Back Left

########################################
# AXIS TWIST COMPENSATION
########################################
[axis_twist_compensation]
calibrate_start_x: 30           ; Probe lands at X=5.75 — just on bed
calibrate_end_x: 150            ; Probe lands at X=125.75
calibrate_y: 90                 ; Probe lands at Y=110.45

