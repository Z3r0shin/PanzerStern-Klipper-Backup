[include autotune_tmc_DB.cfg]
[firmware_retraction]
retract_length: 0
########################################
# X Stepper Config
########################################
[stepper_x]
step_pin: PB13
dir_pin: PB12                # Invert (remove '!') if X moves the wrong direction
enable_pin: !PB14
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 200
endstop_pin: ^PC2
position_endstop: 0
position_min: 0
position_max: 310
homing_speed: 50
homing_retract_dist: 5

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.850          # Max current for the moons-ms17hd6p420I-04 is 2A
stealthchop_threshold: 999999

########################################
# EXTRUDER Config
########################################
[thermistor TZ_V6]
temperature1: 30.5
resistance1: 78674
temperature2: 120.0
resistance2: 1803
temperature3: 241.5
resistance3: 106

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 21.696         # Sherpa Mini — calibrate for your build
gear_ratio: 50:10                 # Sherpa Mini standard 5:1 ratio
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: TZ_V6
sensor_pin: PA0
min_temp: 0
max_temp: 330
min_extrude_temp: 180
max_extrude_only_distance: 200
max_extrude_only_velocity: 60
control: pid
pid_Kp=33.303 
pid_Ki=9.653 
pid_Kd=28.724
pressure_advance: 0.04            # Calibrate separately for this toolhead

[verify_heater extruder]
max_error: 120
check_gain_time: 30
hysteresis: 10
heating_gain: 2

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650                # Sherpa Mini typically runs a small NEMA14 motor
interpolate: False

########################################
# PROBE Config
########################################

[gcode_macro PROBE_DOWN]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[gcode_macro PROBE_UP]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

[output_pin probe_enable]
pin: PA1
value: 0

[probe]
pin: ^!PC14
deactivate_on_each_sample: False
speed: 5.0
lift_speed: 10.0
samples: 2
sample_retract_dist: 3.0
samples_result: median
samples_tolerance: 0.010
samples_tolerance_retries: 3
x_offset: 0.0
y_offset: -26.5
z_offset: 1.125
activate_gcode:
    PROBE_DOWN
    G4 P500
deactivate_gcode:
    PROBE_UP

########################################
# BED MESH LEVELING
########################################

[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 270, 260
probe_count: 5, 5
mesh_pps: 2, 2
algorithm: bicubic
zero_reference_position: 140, 140   # Bed center — mesh is referenced here
fade_start: 1.0
fade_end: 10.0
fade_target: 0.0

########################################
# BED SCREW TRAMMING AID
########################################

[bed_screws]
screw1: 30, 30
screw1_name: Front Left
screw2: 250, 30
screw2_name: Front Right
screw3: 250, 250
screw3_name: Back Right
screw4: 30, 250
screw4_name: Back Left

########################################
# AXIS TWIST COMPENSATION
########################################
[axis_twist_compensation]
calibrate_start_x: 30           ; Probe lands at X=5.75 — just on bed
calibrate_end_x: 150            ; Probe lands at X=125.75
calibrate_y: 90                 ; Probe lands at Y=110.45

########################################
# INPUT SHAPER
########################################

[input_shaper]
shaper_type_x: 3hump_ei
shaper_freq_x: 86.6

########################################
# AXIS TWIST COMPENSATION
########################################