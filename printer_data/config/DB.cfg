# ── BTT Eddy Coil (LDC1612 via I2C on RP2040) ───────────────────
# The Eddy Coil is connected to the RP2040's I2C bus.
# See RP2040.cfg for bus details and the I2C wiring notes.
#
# IMPORTANT — After flashing, you must run these calibration steps
# IN ORDER before the Eddy will work:
#   1. Position Eddy ~20 mm above the bed centre
#      LDC_CALIBRATE_DRIVE_CURRENT CHIP=btt_eddy
#      SAVE_CONFIG
#   2. Home X/Y, then:
#      PROBE_EDDY_CURRENT_CALIBRATE CHIP=btt_eddy
#      (do the paper test, ACCEPT, wait for mapping)
#      SAVE_CONFIG
#   3. Verify x_offset / y_offset with the Klipper offset guide
#   4. (Optional) Thermal drift calibration — see Eddy_Probe docs:
#      TEMPERATURE_PROBE_CALIBRATE PROBE=btt_eddy TARGET=<max_coil_temp>
#      SAVE_CONFIG
 
[probe_eddy_current btt_eddy]
sensor_type: ldc1612
i2c_mcu: rp2040
i2c_bus: i2c1a                    # gpio2 (SDA) / gpio3 (SCL)
# i2c_software_sda_pin: rp2040:gpio3
# i2c_software_scl_pin: rp2040:gpio2
#i2c_address:                     # Default 0x2A is correct for BTT Eddy
z_offset: 1.0                     # Initial safe value — will be overwritten by calibration
x_offset: 32.74
y_offset: -12.4

########################################
# BED MESH LEVELING
########################################

[bed_mesh]
speed: 200
horizontal_move_z: 2
mesh_min: 33, 13
mesh_max: 288, 288
probe_count: 9, 9
mesh_pps: 2, 2
algorithm: bicubic
zero_reference_position: 112, 144   # Bed center — mesh is referenced here
fade_start: 1.0
fade_end: 10.0
fade_target: 0.0

########################################
# BED SCREW TRAMMING AID
########################################

[screws_tilt_adjust]
screw1: 17, 48
screw1_name: Front Left
screw2: 233, 48
screw2_name: Front Right
screw3: 233, 262
screw3_name: Back Right
screw4: 17, 262
screw4_name: Back Left
screw_thread: CW-M4

# ########################################
# # AXIS TWIST COMPENSATION
